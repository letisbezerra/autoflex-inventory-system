# --- Database Connection (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:admin}
quarkus.datasource.password=${DB_PASSWORD:admin}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory_db}

# --- Hibernate & Persistence ---
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# --- Server Configuration ---
quarkus.http.port=8080

# --- CORS (Configuração Limpa) ---
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-origin=true

# Força o Quarkus a aceitar conexões em qualquer interface
quarkus.http.host=0.0.0.0

# --- Swagger UI & OpenAPI ---
quarkus.swagger-ui.always-include=true


